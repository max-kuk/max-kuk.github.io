baseURL: /
title: M. Kukushkin

# Comment when installing using Hugo Modules
# theme: eureka
# Uncomment when installing using Hugo Modules
theme: github.com/wangchucheng/hugo-eureka

paginate: 3
copyright: >
  &copy; 2021 <a href="max-kuk.github.io">M. Kukushkin</a>
enableEmoji: true
enableGitInfo: true
summaryLength: 75

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false

# Uncomment for google analytics
googleAnalytics: G-EH11GZ27SW

markup:
  # Do not modify markup.highlight
  highlight:
    codeFences: false
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  category: categories
  tag: tags
  series: series
  author: authors

build:
  useResourceCacheWhen: always
