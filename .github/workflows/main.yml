name: github pages

on:
  push:
    branches:
      - main  # Set a branch to deploy
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          # extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          #external_repository: max-kuk/max-kuk.github.io
          publish_dir: ./public
          #   keep_files: true
          #user_name: max-kuk
          #user_email: max.kukuskin@yandex.com
          publish_branch: master
          #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
